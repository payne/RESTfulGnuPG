version: "3.8"

services:
  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,secretsmanager
      - DEBUG=0
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "8080:8080"
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
      - KEY_BUCKET=gnupg-lambda-keys-local
      - SERVICE_KEY_SECRET_ARN=arn:aws:secretsmanager:us-east-1:000000000000:secret:gnupg-lambda/service-key/local
      - GNUPGHOME=/tmp/gnupg
      - LOG_LEVEL=DEBUG
    depends_on:
      localstack:
        condition: service_healthy

volumes:
  localstack_data:
